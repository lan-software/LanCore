services:
    laravel.test:
        container_name: 'lancore.test'
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
            - lanparty
        depends_on:
            - pgsql
            - redis
            - mailpit
            - garage
            - mysql
    queue:
        build:
            context: ./vendor/laravel/sail/runtimes/8.5
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: sail-8.5/app
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - laravel.test
            - pgsql
            - redis
        command: 'php artisan queue:work --sleep=3 --tries=3 --max-time=3600'
        restart: unless-stopped
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5430}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6370}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        container_name: infrastructure-mailpit
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8021}:8025'
        networks:
            - sail
            - infrastructure
    garage:
        image: 'dxflrs/garage:v2.2.0'
        restart: unless-stopped
        ports:
            - '${FORWARD_GARAGE_S3_PORT:-3900}:3900'
            - '${FORWARD_GARAGE_RPC_PORT:-3901}:3901'
            - '${FORWARD_GARAGE_ADMIN_PORT:-3903}:3903'
        volumes:
            - './contrib/garage.toml:/etc/garage.toml'
            - 'garage-meta:/var/lib/garage/meta'
            - 'garage-data:/var/lib/garage/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - /garage
                - status
            interval: 10s
            retries: 3
            timeout: 5s
    garage-webui:
        image: 'khairul169/garage-webui:latest'
        restart: unless-stopped
        ports:
            - '${FORWARD_GARAGE_WEBUI_PORT:-3909}:3909'
        environment:
            API_BASE_URL: 'http://garage:3903'
            S3_ENDPOINT_URL: 'http://garage:3900'
        volumes:
            - './contrib/garage.toml:/etc/garage.toml:ro'
        networks:
            - sail
        depends_on:
            - garage
    mockserver:
        image: 'mockserver/mockserver:latest'
        ports:
            - '1080:1080'
        networks:
            - sail
    mysql:
        image: 'mysql:8.4'
        ports:
            - '${FORWARD_DB_PORT:-3306}:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_HOST: '%'
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ALLOW_EMPTY_PASSWORD: 1
            MYSQL_EXTRA_OPTIONS: '${MYSQL_EXTRA_OPTIONS:-}'
        volumes:
            - 'sail-mysql:/var/lib/mysql'
            - './vendor/laravel/sail/database/mysql/create-testing-database.sh:/docker-entrypoint-initdb.d/10-create-testing-database.sh'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - mysqladmin
                - ping
                - '-p${DB_PASSWORD}'
            retries: 3
            timeout: 5s
networks:
    sail:
        driver: bridge
    lanparty:
        external: true
    infrastructure:
        external: true

volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    garage-meta:
        driver: local
    garage-data:
        driver: local
    sail-mysql:
        driver: local
