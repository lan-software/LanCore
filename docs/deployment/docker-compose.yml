services:
  app:
    image: ghcr.io/lan-software/lancore:latest
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    environment:
      APP_NAME: "${APP_NAME:-LanCore}"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      APP_TIMEZONE: "${APP_TIMEZONE:-UTC}"
      APP_LOCALE: "${APP_LOCALE:-en}"
      LOG_CHANNEL: stderr
      LOG_LEVEL: "${LOG_LEVEL:-error}"
      DB_CONNECTION: pgsql
      DB_HOST: pgsql
      DB_PORT: 5432
      DB_DATABASE: "${DB_DATABASE:-lancore}"
      DB_USERNAME: "${DB_USERNAME:-lancore}"
      DB_PASSWORD: "${DB_PASSWORD}"
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: "${REDIS_PASSWORD:-null}"
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST}"
      MAIL_PORT: "${MAIL_PORT:-587}"
      MAIL_USERNAME: "${MAIL_USERNAME}"
      MAIL_PASSWORD: "${MAIL_PASSWORD}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-LanCore}"
      FILESYSTEM_DISK: s3
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AWS_DEFAULT_REGION: "${AWS_DEFAULT_REGION:-us-east-1}"
      AWS_BUCKET: "${AWS_BUCKET:-lancore}"
      AWS_ENDPOINT: "${AWS_ENDPOINT:-http://minio:9000}"
      AWS_URL: "${AWS_URL}"
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      pgsql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lancore

  pgsql:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_DATABASE:-lancore}"
      POSTGRES_USER: "${DB_USERNAME:-lancore}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - pgsql-data:/var/lib/postgresql/data
    networks:
      - lancore
    healthcheck:
      test: ["CMD", "pg_isready", "-q", "-d", "${DB_DATABASE:-lancore}", "-U", "${DB_USERNAME:-lancore}"]
      interval: 10s
      retries: 5
      timeout: 5s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --requirepass "${REDIS_PASSWORD:-}"
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save ""
    volumes:
      - redis-data:/data
    networks:
      - lancore
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 3
      timeout: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${AWS_ACCESS_KEY_ID}"
      MINIO_ROOT_PASSWORD: "${AWS_SECRET_ACCESS_KEY}"
    volumes:
      - minio-data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - lancore
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 3
      timeout: 5s

networks:
  lancore:
    driver: bridge

volumes:
  pgsql-data:
    driver: local
  redis-data:
    driver: local
  minio-data:
    driver: local
